version: "3.8"

services:
  receipt-analyser:
    build: .
    image: thejijogeorge/receipt-analyser:1.1.0
    container_name: receipt-analyser
    ports:
      - "5050:5000"
    env_file:
      - .env
    environment:
      RCLONE_REMOTE: "gdrive:Receipt_Analyser"
      RECEIPTS_FOLDER: "/receipts"
    volumes:
      # Host folder containing your receipt PDFs -> mounted at /receipts in the container.
      # In the app UI, enter "/receipts" as the folder path. This same folder is
      # also where "Sync from Google Drive" downloads new files to.
      - D:/Coding/Receipt Analyser/receipts:/receipts
      # rclone's OAuth config, created on the host via `rclone config` -- mounted
      # read-only so the container can authenticate to Google Drive.
      - ~/.config/rclone:/root/.config/rclone:ro
    restart: unless-stopped
